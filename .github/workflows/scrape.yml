name: Daily Price Scraper

on:
  schedule:
    # This runs the script every day at midnight (UTC time)
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to manually click a button to test it

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run scraper script
      env:
        # This pulls your secure password from Step 2 into the server
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python scraper.py
